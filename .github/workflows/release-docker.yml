name: Release Docker image

# On every git tag of the form v*.*.* (project-wide milestone) or
# filamind_*/v*.*.* (per-addon), build the bundled Dockerfile and
# push it to GitHub Container Registry.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'filamind_iot_full/v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build + push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag-derived image tag
        id: tag
        run: |
          ref="${GITHUB_REF##refs/tags/}"
          # v1.2.3 → 1.2.3
          # filamind_iot_full/v1.2.3 → 1.2.3
          version="${ref##*/v}"
          version="${version##v}"
          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:${version}" >>"$GITHUB_OUTPUT"
          echo "image_latest=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.tag.outputs.image }}
            ${{ steps.tag.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
