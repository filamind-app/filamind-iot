name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ADDONS_DIR: addons
  ADDONS: filamind_iot filamind_pos_iot filamind_stock_iot filamind_mrp_iot filamind_kitchen_display

jobs:
  lint-python:
    name: Lint Python (ruff + py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install ruff

      - name: ruff check (every addon)
        run: |
          for a in $ADDONS; do
              echo "::group::ruff $a"
              ruff check "$ADDONS_DIR/$a"
              echo "::endgroup::"
          done

      - name: py_compile every Python file across all addons
        run: |
          fail=0
          for a in $ADDONS; do
              while IFS= read -r f; do
                  python -m py_compile "$f" || { echo "::error file=$f::syntax error"; fail=1; }
              done < <(find "$ADDONS_DIR/$a" -name '*.py')
          done
          exit $fail

  validate-xml:
    name: Validate XML well-formedness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Parse every XML file across all addons
        run: |
          fail=0
          for a in $ADDONS; do
              while IFS= read -r f; do
                  python -c "import xml.etree.ElementTree as ET; ET.parse('$f')" \
                      || { echo "::error file=$f::malformed XML"; fail=1; }
              done < <(find "$ADDONS_DIR/$a" -name '*.xml')
          done
          exit $fail

  manifest-sanity:
    name: Manifest references must exist on disk (every addon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify every 'data' file in __manifest__.py is present
        run: |
          python <<'PY'
          import ast, os, pathlib, sys

          addons_dir = pathlib.Path(os.environ['ADDONS_DIR'])
          fail = False
          for a in os.environ['ADDONS'].split():
              addon_root = addons_dir / a
              manifest_path = addon_root / '__manifest__.py'
              if not manifest_path.is_file():
                  print(f"::error::missing {manifest_path}")
                  fail = True
                  continue
              manifest = ast.literal_eval(manifest_path.read_text())

              for rel in manifest.get('data', []):
                  p = addon_root / rel
                  if not p.is_file():
                      print(f"::error file={manifest_path}::missing referenced file: {rel}")
                      fail = True

              # Asset paths in manifest start with the addon technical name
              # (Odoo resolves them via the addons_path), so we resolve them
              # against ADDONS_DIR rather than addon_root.
              for rel in manifest.get('assets', {}).get('web.assets_backend', []):
                  parts = rel.split('/', 1)
                  if len(parts) == 2:
                      p = addons_dir / parts[0] / parts[1]
                      if not p.is_file():
                          print(f"::error file={manifest_path}::missing asset: {rel}")
                          fail = True

          sys.exit(1 if fail else 0)
          PY

  no-leftover-rename:
    name: No 'iot_custom' module references survived
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep -w only matches whole words (skips iot_customer_display_id etc.)
        run: |
          fail=0
          for a in $ADDONS; do
              if grep -wRIn 'iot_custom' "$ADDONS_DIR/$a" 2>&1; then
                  echo "::error::'iot_custom' module reference found in $a/"
                  fail=1
              fi
          done
          exit $fail

  routes-aliases:
    name: Each filamind_iot route exposes /filamind_iot/* + /iot/* alias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python <<'PY'
          import os, pathlib, re, sys
          src = pathlib.Path(
              os.environ['ADDONS_DIR'],
              'filamind_iot/controllers/iot_controller.py',
          ).read_text()
          decls = re.findall(r'@http\.route\(\s*\[([^\]]+)\]', src)
          fail = False
          # An ALIAS path is anything beginning with /iot/ that isn't already
          # a /filamind_iot/ path.  This covers /iot/setup, /iot/log,
          # /iot/keyboard_layouts, /iot/get_handlers, /iot/box/<id>/display_url,
          # and /iot/box/<action>.
          alias_re = re.compile(r"['\"](/iot/[^'\"]+)['\"]")
          fila_re  = re.compile(r"['\"](/filamind_iot/[^'\"]+)['\"]")
          for d in decls:
              filaminds = fila_re.findall(d)
              aliases   = [p for p in alias_re.findall(d)
                            if not p.startswith('/filamind_iot/')]
              if not filaminds:
                  print(f"::error::route missing a /filamind_iot/* canonical path: {d.strip()}")
                  fail = True
              if not aliases:
                  print(f"::error::route missing an /iot/* upstream alias: {d.strip()}")
                  fail = True
          sys.exit(1 if fail else 0)
          PY

  addon-installable:
    name: All four __manifest__.py files declare installable=True
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python <<'PY'
          import ast, os, pathlib, sys
          addons_dir = pathlib.Path(os.environ['ADDONS_DIR'])
          fail = False
          for a in os.environ['ADDONS'].split():
              m = ast.literal_eval(
                  (addons_dir / a / '__manifest__.py').read_text()
              )
              if not m.get('installable', True):
                  print(f"::error::{a} is not installable")
                  fail = True
              if not m.get('depends'):
                  print(f"::error::{a} has empty depends")
                  fail = True
          sys.exit(1 if fail else 0)
          PY
