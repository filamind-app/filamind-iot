[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
# Sensible defaults for Odoo 19 addons.
select = ["E", "F", "W", "B"]

[tool.ruff.lint.per-file-ignores]
# Odoo's `from . import X` idiom in __init__.py files is by design.
"__init__.py" = ["F401"]
# Odoo __manifest__.py files are bare dict literals — that's the API contract.
"__manifest__.py" = ["B018"]
# Inline JS/HTML templates (kitchen_controller renders the public KDS
# tablet page) cannot meaningfully wrap.
"**/kitchen_controller.py" = ["E501"]
