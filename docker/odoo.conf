[options]
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons,/mnt/extra-addons/filamind
data_dir = /var/lib/odoo
admin_passwd = ${ADMIN_PASSWORD:-admin}
db_host = ${DB_HOST:-db}
db_port = ${DB_PORT:-5432}
db_user = ${DB_USER:-odoo}
db_password = ${DB_PASSWORD:-odoo}
db_name = ${DB_NAME:-filamind}
proxy_mode = True
gevent_port = 8072
without_demo = True
log_level = info
log_handler = odoo.modules.loading:INFO
workers = ${WORKERS:-2}
max_cron_threads = ${MAX_CRON_THREADS:-1}
